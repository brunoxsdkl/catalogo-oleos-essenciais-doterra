<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÓLEOS ESSENCIAS - TULIPA ESSÊNCIAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@300;400;500&amp;font_display=swap');
    
    :root {
      --green: #01843d;
      --cream: #f8f5f0;
    }
    
    body {
      font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    
    .heading-serif {
      font-family: 'Playfair Display', Georgia, serif;
      letter-spacing: -0.02em;
    }

    .oil-card {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #e5e0d5;
    }
    
    .oil-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
      border-color: #c9b99a;
    }

    .oil-img {
      background: #f8f5f0;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .oil-card:hover .oil-img {
      transform: scale(1.03);
    }

    .section-header {
      letter-spacing: -0.03em;
    }

    .doterra-green {
      color: #01843d;
    }

    .catalog-container {
      background: #f8f5f0;
    }

    .oil-name {
      font-size: 1.05rem;
      line-height: 1.1;
    }

    .clean-card {
      background: white;
    }

    .meta {
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    /* Fullscreen Viewer */
    #viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
    }
    #viewer.open {
      display: flex;
    }
    #viewer .viewer-container {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #viewer .viewer-image-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-width: 0;
    }
    #viewer .viewer-image-area img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    #viewer .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #viewer .nav-arrow:hover {
      background: rgba(255,255,255,0.3);
    }
    #viewer .nav-arrow.prev {
      left: 20px;
    }
    #viewer .nav-arrow.next {
      right: 20px;
    }
    #viewer .viewer-sidebar {
      width: 380px;
      background: white;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    #viewer .viewer-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }
    #viewer .viewer-close:hover {
      background: rgba(255,255,255,0.3);
    }
    #viewer .viewer-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      letter-spacing: 2px;
    }

    @media (max-width: 768px) {
      #viewer .viewer-container {
        flex-direction: column;
      }
      #viewer .viewer-sidebar {
        width: 100%;
        height: 45%;
        padding: 24px 20px;
      }
      #viewer .viewer-image-area {
        height: 55%;
      }
      #viewer .nav-arrow {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
      #viewer .nav-arrow.prev { left: 10px; }
      #viewer .nav-arrow.next { right: 10px; }
    }
  </style>
</head>
<body class="bg-[#f8f5f0] text-[#2c2a25]">

  <!-- Search & Filters -->
  <div class="max-w-7xl mx-auto px-6 pt-8 pb-6">
    <div class="flex items-center gap-3 mb-6">
      <img src="logo.png" alt="TULIPA ESSÊNCIAS" class="h-10 w-auto rounded-full">
      <div>
        <span class="font-semibold text-lg tracking-tight">TULIPA ESSÊNCIAS</span>
        <div class="text-xs text-[#7c7668] tracking-[1px]">CATÁLOGO DE ÓLEOS ESSENCIAIS</div>
      </div>
    </div>
    <div class="flex flex-col md:flex-row gap-3 items-center bg-white border border-[#e5e0d5] rounded-3xl px-5 py-4">
      <div class="flex-1 relative w-full">
        <i class="fa-solid fa-search absolute left-5 top-3.5 text-[#a39d8f]"></i>
        <input id="search" type="text" placeholder="Buscar por nome do óleo (ex: Lavanda, Bergamota...)" 
               class="w-full bg-transparent pl-12 pr-4 py-3 text-base outline-none placeholder:text-[#a39d8f]" 
               onkeyup="filterOils()">
      </div>
      <div class="flex gap-2 text-xs">
        <button onclick="filterByTag('all')" class="active-tag px-4 py-2 rounded-2xl bg-[#01843d] text-white text-sm">Todos</button>
        <button onclick="filterByTag('relax')" class="px-4 py-2 rounded-2xl border border-[#c9b99a] hover:bg-[#f8f5f0] text-sm">Relaxamento</button>
        <button onclick="filterByTag('pele')" class="px-4 py-2 rounded-2xl border border-[#c9b99a] hover:bg-[#f8f5f0] text-sm">Pele</button>
        <button onclick="filterByTag('purifica')" class="px-4 py-2 rounded-2xl border border-[#c9b99a] hover:bg-[#f8f5f0] text-sm">Purificação</button>
      </div>
    </div>
  </div>

  <!-- Catalog Grid -->
  <div id="catalogo" class="max-w-7xl mx-auto px-6 pb-16">
    <div class="flex items-end justify-between mb-6 px-1">
      <div>
        <span class="text-xs tracking-[2px] text-[#7c7668]">34 ÓLEOS ESSENCIAIS</span>
        <h2 class="section-header text-4xl font-semibold tracking-tight">Nossa Seleção</h2>
      </div>
      <div class="text-xs text-[#7c7668] hidden md:block">
        Baseado no Guia de Produtos dōTERRA Brasil 2024
      </div>
    </div>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="border-t border-[#e5e0d5] py-8 text-center text-xs text-[#7c7668]">
    <div class="max-w-5xl mx-auto px-6">
      Catálogo de Óleos Essenciais - TULIPA ESSÊNCIAS<br>
      Imagens e descrições baseadas no Guia de Produtos oficial. Para uso de vendedoras.
    </div>
  </footer>

  <!-- Fullscreen Viewer -->
  <div id="viewer">
    <button class="viewer-close" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></button>
    <div class="viewer-container">
      <div class="viewer-image-area">
        <button class="nav-arrow prev" onclick="navigateOil(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <img id="viewer-img" src="" alt="">
        <button class="nav-arrow next" onclick="navigateOil(1)"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="viewer-counter" id="viewer-counter"></div>
      </div>
      <div class="viewer-sidebar">
        <div id="viewer-tag" class="text-xs tracking-[2px] text-[#01843d] font-medium mb-2"></div>
        <div id="viewer-name" class="heading-serif text-4xl font-bold tracking-tight text-[#2c2a25] mb-4"></div>
        <div class="w-12 h-0.5 bg-[#01843d] mb-4"></div>
        <div id="viewer-desc" class="text-[#5c5a52] leading-relaxed text-base"></div>
        <div class="mt-auto pt-6">
          <button onclick="shareOil()" class="w-full py-3 text-sm font-medium bg-[#01843d] text-white rounded-2xl hover:bg-[#016b32] transition-colors">
            <i class="fa-solid fa-share-nodes mr-2"></i>Compartilhar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const oils = [
      { name: "Alfa Bisabolol Candeia", file: "Alfa Bisabolol Candeia.png", tag: "pele", desc: "Extraído da árvore brasileira de candeia. Rico em bisabolol, conhecido por acalmar a pelee e reduzir irritações com ação anti-inflmatória suave." },
      { name: "Anis Estrelado", file: "Anis Estrelado.png", tag: "relax", desc: "Aroma doce e picante característico. Tradicionalmente usado para promover sensação de conforto e bem-estar digestivo." },
      { name: "Bergamota", file: "Bergamota.png", tag: "pele", desc: "A mais delicada das plantas cítricas. Muito utilizada pelos italianos para revigorar a pele e elevar o humor." },
      { name: "Betula", file: "Betula.png", tag: "relax", desc: "Óleo de bétula com aroma amadeirado fresco. Tradicionalmente apreciado em massagens para sensação de alívio muscular." },
      { name: "Canela Casca", file: "Canela Casca.png", tag: "purifica", desc: "Parente próxima da canela, com aroma condimentado e forte. Traz sensação de alívio e aconchego." },
      { name: "Canela Folhas", file: "Canela Folhas.png", tag: "purifica", desc: "Versão mais suave da canela. Aroma quente e picante, excelente para difusão e criação de ambientes acolhedores." },
      { name: "Cedro", file: "Cedro.png", tag: "pele", desc: "Promove pele limpa e saudável. Aroma acolhedor e amadeirado que auxilia no relaxamento e bem-estar." },
      { name: "Cipreste", file: "Cipreste.png", tag: "pele", desc: "Destilado dos gravetos e folhagem da árvore. Popular em spas para ajudar a embelezar e tonificar a pele." },
      { name: "Citronela", file: "Citronela.png", tag: "purifica", desc: "Aroma fresco e marcante. Companheiro ideal para acampamentos, caminhadas e proteção ao ar livre." },
      { name: "Cravo Folhas", file: "Cravo Folhas.png", tag: "purifica", desc: "Óleo estimulante e potente. Tradicionalmente usado em massagens confortantes e para purificação." },
      { name: "Erva Doce", file: "Erva Doce.png", tag: "relax", desc: "Aroma distinto de alcaçuz. Usado desde a antiguidade por guerreiros romanos para fortalecer e dar coragem." },
      { name: "Eucalipto Staigeriana", file: "Eucalipto Staigeriana.png", tag: "purifica", desc: "Variedade cítrica de eucalipto. Aroma refrescante que promove sensação de vias aéreas livres e purificação." },
      { name: "Gengibre", file: "Gengibre.png", tag: "relax", desc: "Colhido em Madagascar do rizoma fresco. Aroma condimentado e quente, revigorante e acolhedor." },
      { name: "Laranja Doce", file: "Laranja Doce.png", tag: "relax", desc: "Aroma cítrico maravilhoso. Excelente para energizar, revigorar e elevar o humor naturalmente." },
      { name: "Lavanda", file: "Lavanda.png", tag: "relax", desc: "O mais valorizado por seu aroma inconfundível. Conhecido mundialmente por suas qualidades relaxantes e calmantes." },
      { name: "Lavandin", file: "Lavandin.png", tag: "relax", desc: "Híbrido de lavanda com aroma floral mais intenso. Excelente para relaxamento profundo e ambientes de descanso." },
      { name: "Limão Siciliano", file: "Limao Siciliano.png", tag: "purifica", desc: "Purificante tópico e aromático favorito. Pode ser combinado com muitos outros óleos para limpeza e frescor." },
      { name: "Lim, Tahiti", file: "Limao Tahiti.png", tag: "purifica", desc: "Aroma cítrico marcante e revigorante. Afeta positivamente o humor e traz sensação de limpeza." },
      { name: "Mandarina Verde", file: "Mandarina Verde.png", tag: "relax", desc: "Extraída do fruto não maduro da tangerina. Propriedades reconfortantes e de limpeza, aroma doce e fresco." },
      { name: "Mandarina Vermelha", file: "Mandarina Vermella.png", tag: "relax", desc: "Aroma cítrico doce e vibrante. Excelente para elevar o espírito e criar sensações positivas." },
      { name: "Manjericão", file: "Manjericao.png", tag: "relax", desc: "Aroma acolhedor e herbaãeo. Ajuda a reduzir sentimentos de tensão quando aplicado na nuca e têmporas." },
      { name: "Manjerona", file: "Manjerona.png", tag: "relax", desc: "Ideal para adicionar em óleos de massagem. Ajuda a aliviar músculos cansados e desgastados." },
      { name: "Melaleuca", file: "Melaleuca.png", tag: "pele", desc: "Rica em mais de 90 compostos. Excelente para a pele com aplicações ilimitadas e propriedades purificantes." },
      { name: "Moringa Oleifera", file: "Moringa Oleifera.png", tag: "pele", desc: "Óleo altamente nutritivo extraído das sementes. Rico em vitaminas e ideal para hidratação profunda da pele e cabelos." },
      { name: "Noz Moscada", file: "Noz Moscada.png", tag: "relax", desc: "Aroma quente, picante e reconfortante. Tradicionalmente usado para promover foco e bem-estar emocional." },
      { name: "Olíbano", file: "Olibano.png", tag: "relax", desc: "Talvez o mais precioso dos óleos. Procurado bá milänios por promover relaxamento e efeito positivo sobre o humor." },
      { name: "Palmarosa", file: "Palmarosa.png", tag: "pele", desc: "Aroma floral doce e equilibrante. Excelente para promover hidratação e aparência saudável da pele." },
      { name: "Petitgrain", file: "Petitgrain.png", tag: "relax", desc: "Amplamente usado em perfumaria. Nota fresca e herbácea que oferece benefícios relaxantes e alívio de tensão." },
      { name: "Pimenta Preta", file: "Pimenta Preta.png", tag: "purifica", desc: "Benefícios notáveis contra ameças sazonais. Use com cautela em aplicações tópicas." },
      { name: "Pimenta Rosa", file: "Pimenta Rosa.png", tag: "purifica", desc: "Aroma picante e frutado vibrante. Ajuda a elevar o humor e criar atmosferas energizantes." },
      { name: "Sálvia Esclareia", file: "Salvia Esclareia.png", tag: "relax", desc: "Usos desde a Idade Média. Ajuda a relaxar, acalmar e promove aspecto revitalizado à pele." },
      { name: "Tomilho Branco", file: "Tomilho Branco.png", tag: "purifica", desc: "Óleo potente com efeitos purificantes. Era oferecido a guerreiros na Idade Média por sua força e coragem." }
    ]

    let currentIndex = 0
    let filteredOils = oils

    function createCard(oil, index) {
      const card = document.createElement('div')
      card.className = `oil-card clean-card rounded-3xl overflow-hidden cursor-pointer group min-h[520px] flex flex-col`
      card.innerHTML = `
        <div class="relative flex-1 aspect-[3/4]">
          <img src="${oil.file}" alt="${oil.name}" class="oil-img absolute inset-0 w-full h-full object-cover" onerror="this.style.background='#e5e0d5'; this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjhmNWYwIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTgiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5JbWFnZW0gZG8gT2xlbzwvdGV4dD48L3N2Zz4='">
          <div class="absolute top-3 right-3">
            <span class="meta px-2.5 py-0.5 bg-white/90 backdrop-blur rounded-full text-[#01843d] font-medium shadow-sm">${oil.tag.toUpperCase()}</span>
          </div>
        </div>
        <div class="p-4">
          <div class="oil-name font-semibold text-[#2c2a25] tracking-tight mb-1.5">${oil.name}</div>
          <p class="text-sm text-[#5c5a52] line-clamp-2">${oil.desc}</p>
          <div class="mt-3 flex items-center text-xs text-[#7c7668]">
            <span class="flex-1">TULIPA ESSÊNCIAS</span>
            <span class="group-hover:text-[#01843d] transition-colors flex items-center">Ampliar <i class="fa-solid fa-expand ml-1 text-[9px]"></i></span>
          </div>
        </div>
      `
      card.onclick = () => openViewer(index)
      return card
    }

    function renderOils(oilsArray) {
      filteredOils = oilsArray
      const grid = document.getElementById('grid')
      grid.innerHTML = ''
      oilsArray.forEach((oil, i) => {
        grid.appendChild(createCard(oil, i))
      })
    }

    function filterOils() {
      const term = document.getElementById('search').value.toLowerCase().trim()
      const filtered = oils.filter(o => o.name.toLowerCase().includes(term))
      renderOils(filtered)
    }

    let currentTag = 'all'
    function filterByTag(tag) {
      currentTag = tag
      document.querySelectorAll('.flex.gap-2 button').forEach(btn => {
        btn.classList.remove('bg-[#01843d]', 'text-white')
        btn.classList.add('border', 'border-[#c9b99a]')
        if ((tag === 'all' && btn.textContent === 'Todos') ||
            (tag === 'relax' && btn.textContent.includes('Relax')) ||
            (tag === 'pele' && btn.textContent.includes('Pele')) ||
            (tag === 'purifica' && btn.textContent.includes('Purif'))) {
          btn.classList.add('bg-[#01843d]', 'text-white')
          btn.classList.remove('border', 'border-[#c9b99a]')
        }
      })
      
      const term = document.getElementById('search').value.toLowerCase().trim()
      let filtered = oils
      if (tag !== 'all') filtered = filtered.filter(o => o.tag === tag)
      if (term) filtered = filtered.filter(o => o.name.toLowerCase().includes(term))
      renderOils(filtered)
    }

    function openViewer(index) {
      currentIndex = index
      updateViewer()
      document.getElementById('viewer').classList.add('open')
      document.body.style.overflow = 'hidden'
    }

    function closeViewer() {
      document.getElementById('viewer').classList.remove('open')
      document.body.style.overflow = ''
    }

    function navigateOil(dir) {
      currentIndex = (currentIndex / dir + filteredOils.length) % filteredOils.length
      updateViewer()
    }

    function updateViewer() {
      const oil = filteredOils[currentIndex]
      document.getElementById('viewer-img').src = oil.file
      document.getElementById('viewer-img').alt = oil.name
      document.getElementById('viewer-name').textContent = oil.name
      document.getElementById('viewer-desc').textContent = oil.desc
      document.getElementById('viewer-tag').textContent = 'ÓLEO ESSENCIAL • ' + oil.tag.toUpperCase()
      document.getElementById('viewer-counter').textContent = (currentIndex + 1) + ' / ' + filteredOils.length
    }

    function shareOil() {
      const oil = filteredOils[currentIndex]
      if (!oil) return
      const text = `${oil.name} — ${oil.desc}`
      if (navigator.share) {
        navigator.share({ title: oil.name, text })
      } else {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.querySelector('.viewer-sidebar button')
          const orig = btn.innerHTML
          btn.innerHTML = '<i class=\"fa-solid fa-check mr-2\"></i>Copiado!'
          setTimeout(() => { btn.innerHTML = orig }, 1400)
        })
      }
    }

    // Keyboard support
    document.addEventListener('keydown', function(e) {
      if (e.key === '/' && document.activeElement.tagName === 'BODY') {
        e.preventDefault()
        document.getElementById('search').focus()
      }
      if (e.key === 'Escape') {
        const viewer = document.getElementById('viewer')
        if (viewer.classList.contains('open')) closeViewer()
      }
      if (e.key === 'ArrowLeft') {
        const viewer = document.getElementById('viewer')
        if (viewer.classList.contains('open')) navigateOil(-1)
      }
      if (e.key === 'ArrowRight') {
        const viewer = document.getElementById('viewer')
        if (viewer.classList.contains('open')) navigateOil(1)
      }
    })

    // Init
    function initCatalog() {
      renderOils(oils)
      const firstBtn = document.querySelector('.flex.gap-2 button')
      if (firstBtn) firstBtn.classList.add('bg-[#01843d]', 'text-white')
      console.log('%c[Catálogo dĵMERRA] 34 óleos carregados.', 'color:#8a8476')
    }

    window.onload = initCatalog
  </script>
</body>
</html>
